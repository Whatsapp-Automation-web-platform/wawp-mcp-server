# Smithery Configuration for Wawp MCP Server
# https://smithery.ai/docs/config

name: "@wawp/mcp-server"
version: "2.0.1"
description: "Official Wawp WhatsApp API MCP Server. Integrate WhatsApp messaging and automation into your AI tools."
author: "Wawp Team"
repository: "https://github.com/Whatsapp-Automation-web-platform/wawp-mcp-server"
license: "MIT"
keywords:
  - whatsapp
  - messaging
  - automation
  - mcp
  - ai

mcp:
  type: "stdio"
  runtime: "node"
  entrypoint: "dist/index.js"
  install: "npm install && npm run build"
  # This part tells Smithery what inputs to show to the user
  configSchema:
    type: object
    required:
      - WAWP_ACCESS_TOKEN
      - WAWP_INSTANCE_ID
    properties:
      WAWP_ACCESS_TOKEN:
        type: string
        description: "Your Wawp Access Token from the dashboard"
      WAWP_INSTANCE_ID:
        type: string
        description: "Your Wawp Instance ID"
      WAWP_TEST_NUMBER:
        type: string
        description: "Default target phone number for tests (optional)"

  environment:
    - WAWP_ACCESS_TOKEN
    - WAWP_INSTANCE_ID
    - WAWP_TEST_NUMBER
